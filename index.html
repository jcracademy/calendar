<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGTSC Calendar 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap');

        :root {
            --bg-body: #e0e0e0a6;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --primary-accent: #3498db;
            --text-dark: #2c3e50;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.247);
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            /* কালার প্যালেট */
            --clr-normal-class: white; 
            --clr-selected-class: #2ecc71; 
            --clr-weekend: rgba(196, 197, 197, 0.61);
            --clr-weekend-txt: #e74c3c;
            --clr-ramadan: rgba(26, 188, 156, 0.2); 
            --clr-summer: rgba(230, 126, 34, 0.2);  
            --clr-winter: rgba(52, 152, 219, 0.2);  
            --clr-exam: rgba(241, 196, 15, 0.25);    
            --clr-puja: rgba(155, 89, 182, 0.2);    
            --clr-boishakh: rgba(46, 204, 113, 0.25); 
            --clr-other: rgba(149, 165, 166, 0.3);
        }

        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background: radial-gradient(circle at top right, #eef2f3 0%, #f4f7f6 100%);
            margin: 0; padding: 0; 
            box-sizing: border-box;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* হেডার সেকশন */
        .header-section { 
            text-align: center;
            margin-bottom: 2px;
            background: var(--glass-bg);
            padding: 5px;
            backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .header-section p:nth-child(1) { font-size: 1.4rem; font-weight: 700; color: #2c3e50; margin: 0; }
        .header-section p:nth-child(2) { font-size: 1.2rem; font-weight: 600; color: #27ae60; margin: 0; }
        .header-section p:nth-child(3) { font-size: 1rem; color: #e65a22; margin: 0; font-weight: 500; }

        /* ফিল্টার সেকশন */
        .filter-section {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            margin-bottom: 5px;
            background: var(--glass-bg);
            padding: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .filter-control {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-control label {
            font-weight: 600;
            color: #34495e;
            font-size: 15px;
        }

        .filter-control select {
            font-family: 'Hind Siliguri', sans-serif;
            padding: 5px 20px;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid #dcdde1;
            background: white;
            cursor: pointer;
            outline: none;
            min-width: 220px;
            transition: var(--transition-smooth);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .filter-control select:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        /* লিজেন্ড ডিজাইন */
        .legend { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            justify-content: center; 
            margin-bottom: 10px;
            background: var(--glass-bg); 
            padding: 5px;
            backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .box { 
            padding: 6px 14px; 
            border-radius: 30px; 
            font-size: 13px; 
            font-weight: 600; 
            display: flex; 
            align-items: center;
            background: #fff;
            border: 1px solid #edf2f7;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .box span { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; display: inline-block; }

        /* ক্যালেন্ডার গ্রিড */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }

        .month-card { 
            background: #fff; 
            border-radius: 24px; 
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: var(--transition-smooth);
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
        }
        .month-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        /* === চলতি মাসের নতুন আকর্ষণীয় স্টাইল === */
        .current-month {
            background: #fffdf0 !important; 
            border: 2px solid #ffeaa7 !important;
            box-shadow: 0 15px 40px rgba(241, 196, 15, 0.15) !important;
        }
        .current-month .month-name {
            background: #fef9db;
            color: #d35400;
            border-bottom: 2px solid #f9e79f;
        }

        .month-name { 
            background: #fafafa; 
            color: #2c3e50; 
            padding: 15px; 
            text-align: center; 
            font-size: 1.3rem;
            margin: 0; 
            font-weight: 700; 
            border-bottom: 1px solid #f1f2f6;
            letter-spacing: 0.5px;
        }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 15px; }
        .day-name { font-weight: 700; color: #a4b0be; font-size: 12px; padding-bottom: 12px; text-transform: uppercase; text-align: center;}
        
        .day { 
            aspect-ratio: 1 / 1; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 4px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: 600;
            position: relative; 
            transition: var(--transition-smooth); 
            cursor: pointer;
        }
        .day:hover {
            transform: scale(1.15);
            z-index: 2;
        }

        /* === আজকের দিন হাইলাইট করার স্টাইল === */
        .current-day {
            position: relative;
            outline: 2px solid #e67e22 !important;
            outline-offset: 1px;
            font-weight: 800 !important;
            animation: pulseEffect 2s infinite;
        }

        @keyframes pulseEffect {
            0% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0.5); }
            70% { box-shadow: 0 0 0 6px rgba(230, 126, 34, 0); }
            100% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0); }
        }

        /* ক্লাস ও ছুটির স্টাইল */
        .class-day { background-color: var(--clr-normal-class); color: #57606f; border: 1px solid #f1f2f6;}
        
        .selected-routine-day { 
            background-color: var(--clr-selected-class) !important; 
            color: white !important; 
            font-weight: 700 !important;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.35);
            border: none !important;
        }

        .weekend { background-color: var(--clr-weekend) !important; color: var(--clr-weekend-txt) !important; font-weight: 700; border: none !important;}
        .ramadan { background-color: var(--clr-ramadan) !important; color: #16a085; border: 1px solid #a2d9ce; }
        .summer { background-color: var(--clr-summer) !important; color: #d35400; border: 1px solid #f5cba7; }
        .winter { background-color: var(--clr-winter) !important; color: #2980b9; border: 1px solid #aed6f1; }
        .exam { background-color: var(--clr-exam) !important; color: #b7950b; border: 1.5px dashed #f4d03f; }
        .boishakh { background-color: #fbeee6 !important; color: #b03a2e !important; border: 1px solid #e59866; }
        .puja { background-color: var(--clr-puja) !important; color: #8e44ad; border: 1px solid #d7bde2; }
        .other { background-color: var(--clr-other) !important; color: #2c3e50; border: 1px solid #bdc3c7; }

        .day[title]:hover::after {
            content: attr(title);
            position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            background: #2c3e50; color: #fff; padding: 6px 12px;
            border-radius: 8px; font-size: 11px; white-space: nowrap;
            z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <p>পীরগঞ্জ সরকারি টেকনিক্যাল স্কুল ও কলেজ, পীরগঞ্জ, ঠাকুরগাঁও</p>
        <p>২০২৬ সালের একাডেমিক ক্যালেন্ডার </p>
        <p>শ্রেণি ও বিষয় সিলেক্ট করে আপনার বিষয়ের Class Day গুলো এক নজরে দেখে নিন</p>
    </div>

    <div class="filter-section">
        <div class="filter-control">
            <label for="class-select">শ্রেণি নির্বাচন করুন:</label>
            <select id="class-select" onchange="updateSubjectDropdown()">
                <option value="6A">৬ষ্ঠ শ্রেণি ক</option>
                <option value="6B">৬ষ্ঠ শ্রেণি খ</option>
                <option value="7A">৭ম শ্রেণি ক</option>
                 <option value="7B">৭ম শ্রেণি খ</option>
                <option value="8A">৮ম শ্রেণি ক</option>
                <option value="8B">৮ম শ্রেণি খ </option>
                <option value="9A">৯ম শ্রেণি ক</option>
                <option value="9B">৯ম শ্রেণি খ</option>
                <option value="10A">১০ম শ্রেণি ক</option>
                <option value="10B">১০ম শ্রেণি খ</option>
            </select>
        </div>
        <div class="filter-control">
            <label for="subject-select">বিষয় নির্বাচন করুন:</label>
            <select id="subject-select" onchange="updateCalendar()">
            </select>
        </div>
    </div>

    <div class="legend">
        <div class="box"><span style="background: var(--clr-selected-class)"></span>নির্বাচিত বিষয়ের ক্লাস ডে</div>
        <div class="box"><span style="background: #ffffff; border: 1px solid #afafaf"></span>ক্লাস ডে</div>
        <div class="box"><span style="background: var(--clr-weekend-txt)"></span>সাপ্তাহিক ছুটি</div>
        <div class="box"><span style="background: #1abc9c"></span>রমজান ও ঈদ</div>
        <div class="box"><span style="background: #e67e22"></span>গ্রীষ্মকালীন ছুটি</div>
        <div class="box"><span style="background: #3498db"></span>শীতকালীন ছুটি</div>
        <div class="box"><span style="background: #f1c40f"></span>বোর্ড পরীক্ষা</div>
        <div class="box"><span style="background: #95a5a6"></span>অন্যান্য ছুটি</div>
    </div>

    <div id="calendar-grid" class="calendar-grid"></div>
</div>

<script>
    const calendarGrid = document.getElementById('calendar-grid');
    const classSelect = document.getElementById('class-select');
    const subjectSelect = document.getElementById('subject-select');
    
    const year = 2026;
    const monthNames = ["জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"];
    const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    const subjectNamesBengali = {
        "bangla1": "বাংলা ১ম",
        "bangla2": "বাংলা ২য়",
        "english1": "ইংরেজি ১ম",
        "english2": "ইংরেজি ২য়",
        "math": "গণিত",
        "science": "বিজ্ঞান",
        "BDGS": "বাওবি",
        "work": "কর্মমুখী প্র. শিক্ষা",
        "ict": "আইসিটি",
        "religion": "ধর্মশিক্ষা",
        "physics": "পদার্থ বিজ্ঞান",
        "chemistry": "রসায়ন বিজ্ঞান",
        "trade1": "ট্রেড ১",
        "trade2": "ট্রেড ২",
        "trade1Pr": "ট্রেড ১ ব্যবহারিক",
        "trade2Pr": "ট্রেড ২ ব্যবহারিক",
    };
    
    const routineData = {         
        "6A": { 
            "bangla1": [0, 1, 2], 
            "bangla2": [0, 1], 
            "english1": [0, 1, 2], 
            "english2": [0, 1],      
            "math": [0, 1, 2],      
            "science": [0, 1, 2],
            "BDGS": [0, 3], 
            "work": [0, 1, 2],      
            "ict": [0, 1, 4],      
            "religion": [1, 3],        
        },
        "6B": { 
            "bangla1": [0, 1, 2], 
            "bangla2": [0, 1], 
            "english1": [0, 1, 2], 
            "english2": [0, 1],      
            "math": [0, 1, 2],      
            "science": [0, 1, 2],
            "BDGS": [0, 3], 
            "work": [0, 1, 2],      
            "ict": [0, 1, 4],      
            "religion": [1, 3],        
        },
        "7A": { 
            "bangla1": [0, 2], 
            "bangla2": [0, 2], 
            "english1": [1, 3], 
            "english2": [1, 3],      
            "math": [0, 1, 4],      
            "science": [2, 3],
            "BDGS": [1, 3], 
            "work": [2, 4],      
            "ict": [0, 1, 4],      
            "religion": [2, 3],
        },
        "7B": { 
            "bangla1": [0, 2], 
            "bangla2": [0, 2], 
            "english1": [0, 1, 2], 
            "english2": [3, 4],      
            "math": [0, 1, 4],      
            "science": [2, 3],
            "BDGS": [1, 3], 
            "work": [2, 4],      
            "ict": [0, 1, 4],      
            "religion": [2, 3],
        },
        "8": { 
            "bangla1": [0, 2], 
            "bangla2": [0, 2], 
            "english1": [1, 3], 
            "english2": [1, 3],      
            "math": [0, 1, 4],      
            "science": [2, 3],
            "BDGS": [1, 3], 
            "work": [1, 3],      
            "ict": [0, 1, 4],      
            "religion": [2, 3],
        },
        "9": { 
            "bangla1": [0, 2], 
            "english1": [1, 3],      
            "math": [0, 1, 4],      
            "science": [2, 3],
            "BDGS": [1, 3], 
            "work": [1, 3],      
            "ict": [0, 1, 4],      
            "religion": [2, 3],
        },
        "10": { 
            "bangla1": [0, 2],  
            "english2": [1, 3],      
            "math": [0, 1, 4],      
            "science": [2, 3],
            "BDGS": [1, 3], 
            "work": [1, 3],      
            "ict": [0, 1, 4],      
            "religion": [2, 3],
        }
    };

    const myHolidays = {};
    const holidayDescriptions = {};

    function addHolidayRange(start, end, type, description) {
        let current = new Date(start);
        const last = new Date(end);
        while (current <= last) {
            const dateStr = current.getFullYear() + '-' + 
                            String(current.getMonth() + 1).padStart(2, '0') + '-' + 
                            String(current.getDate()).padStart(2, '0');
            myHolidays[dateStr] = type;
            holidayDescriptions[dateStr] = description;
            current.setDate(current.getDate() + 1);
        }
    }

    addHolidayRange("2026-01-17", "2026-01-17", "ramadan", "শব ই মিরাজ"); 
    addHolidayRange("2026-01-23", "2026-01-23", "puja", "সরস্বতী পূজা"); 
    addHolidayRange("2026-02-01", "2026-02-01", "puja", "মাঘী পূর্ণিমা"); 
    addHolidayRange("2026-02-04", "2026-02-04", "ramadan", "শবে বরাত"); 
    addHolidayRange("2026-02-05", "2026-02-05", "other", "সংরক্ষিত ছুটি");  
    addHolidayRange("2026-02-11", "2026-02-12", "other", "নির্বাচন"); 
    addHolidayRange("2026-02-15", "2026-02-15", "puja", "শিবরাত্রী পূজা"); 
    addHolidayRange("2026-02-19", "2026-03-26", "ramadan", "রমজান ও ঈদের ছুটি"); 
    addHolidayRange("2026-04-05", "2026-04-05", "puja", "ইস্টার সানডে"); 
    addHolidayRange("2026-04-12", "2026-04-14", "boishakh", "বৈশাবি ও পহেলা বৈশাখ"); 
    addHolidayRange("2026-05-14", "2026-06-04", "summer", "SSC Exam & Summer vacation"); 
    addHolidayRange("2026-07-29", "2026-07-29", "puja", "আষাড়ী পূর্ণিমা");
    addHolidayRange("2026-08-05", "2026-08-05", "other", "জুলাই বিপ্লব");
    addHolidayRange("2026-08-12", "2026-08-12", "ramadan", "আখেরি চাহার সোম্বা");
    addHolidayRange("2026-08-26", "2026-08-26", "ramadan", "ঈদ ই মিলাদুন্নবী");

    function updateSubjectDropdown() {
        const selectedClass = classSelect.value;
        subjectSelect.innerHTML = '';
        const subjects = Object.keys(routineData[selectedClass]);
        
        subjects.forEach(sub => {
            const option = document.createElement('option');
            option.value = sub;
            option.text = subjectNamesBengali[sub] || sub;
            subjectSelect.appendChild(option);
        });
        
        updateCalendar();
    }

    function updateCalendar() {
        calendarGrid.innerHTML = '';
        
        const selectedClass = classSelect.value;
        const selectedSubject = subjectSelect.value;
        
        if (!selectedSubject) return;

        const subjectText = subjectSelect.options[subjectSelect.selectedIndex].text;
        const activeDays = routineData[selectedClass][selectedSubject];

        // আজকের বাস্তব তারিখ, মাস ও বছর রিয়েলটাইমে ট্র‍্যাক করা
        const today = new Date();
        const currentSystemMonth = today.getMonth(); 
        const currentSystemYear = today.getFullYear();
        const currentSystemDate = today.getDate();

        for (let m = 0; m < 12; m++) {
            let monthDiv = document.createElement('div');
            
            // রিয়েলটাইম চলতি মাস চেনার লজিক
            if (m === currentSystemMonth && year === currentSystemYear) {
                monthDiv.className = 'month-card current-month';
            } else {
                monthDiv.className = 'month-card';
            }
            
            let html = `<h3 class="month-name">${monthNames[m]}</h3><div class="days-grid">`;
            dayNames.forEach(d => html += `<div class="day-name">${d}</div>`);

            let firstDay = new Date(year, m, 1).getDay();
            let daysInMonth = new Date(year, m + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) html += `<div></div>`;

            for (let d = 1; d <= daysInMonth; d++) {
                let dateStr = `${year}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                let dayOfWeek = new Date(year, m, d).getDay(); 
                
                let className = "day class-day"; 
                let tooltipText = "ক্লাস ডে";

                if (activeDays && activeDays.includes(dayOfWeek)) {
                    className = "day class-day selected-routine-day";
                    tooltipText = `${selectedClass}ম শ্রেণি - ${subjectText} ক্লাস`;
                }

                if (dayOfWeek === 5 || dayOfWeek === 6) {
                    className = "day weekend";
                    tooltipText = "সাপ্তাহিক ছুটি";
                }

                if (myHolidays[dateStr]) {
                    className = `day ${myHolidays[dateStr]}`;
                    tooltipText = holidayDescriptions[dateStr];
                }

                // রিয়েলটাইম আজকের দিনটিকে (Current Day) চেনার লজিক
                if (d === currentSystemDate && m === currentSystemMonth && year === currentSystemYear) {
                    className += " current-day";
                    tooltipText += " (আজ)";
                }

                html += `<div class="${className}" title="${tooltipText}">${d}</div>`;
            }

            html += `</div>`;
            monthDiv.innerHTML = html;
            calendarGrid.appendChild(monthDiv);
        }
    }

    updateSubjectDropdown();
</script>

</body>
</html>
